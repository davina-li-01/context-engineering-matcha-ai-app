# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
    paths:
      - "**/*.py"
      - "requirements.txt"
      - ".github/workflows/python-app.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "**/*.py"
      - "requirements.txt"
      - ".github/workflows/python-app.yml"

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        PY_FILES=$(git ls-files '*.py')
        if [ -z "$PY_FILES" ]; then
          echo "No Python files found, skipping lint."
          exit 0
        fi
        # stop the build if there are Python syntax errors or undefined names
        flake8 $PY_FILES --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 $PY_FILES --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        if find . -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
          pytest
        else
          echo "No Python tests found, skipping pytest."
        fi
