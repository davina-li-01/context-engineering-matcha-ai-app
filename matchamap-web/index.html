<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍵 MatchaMap</title>
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Leaflet map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: #f4f7f6; color: #112422; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    .page { max-width: 980px; margin: 0 auto; padding: 24px 16px 56px; display: flex; flex-direction: column; gap: 16px; }
    .app-header h1 { margin: 0; font-size: 2rem; }
    .app-header p { margin: 6px 0 0; color: #2d4f4b; }
    .card { background: #fff; border-radius: 14px; padding: 16px; border: 1px solid #d5e6e3; box-shadow: 0 3px 12px rgba(15,118,110,0.08); }
    .card h2 { margin-top: 0; }
    .stack { display: grid; gap: 10px; }
    label { display: grid; gap: 6px; font-size: 0.95rem; }
    input, select, textarea, button { font: inherit; }
    input, select, textarea { border: 1px solid #b9d3cf; border-radius: 8px; padding: 9px 10px; width: 100%; }
    button { background: #0f766e; color: #fff; border: none; border-radius: 10px; padding: 9px 14px; cursor: pointer; }
    button.secondary { background: #e7f3f1; color: #113c37; }
    button.chip { background: #f0f7f6; color: #10413c; border: 1px solid #cde3df; border-radius: 999px; padding: 4px 10px; font-size: 0.86rem; width: auto; }
    button:disabled { opacity: 0.55; cursor: default; }
    .tabs { display: flex; gap: 8px; margin-bottom: 10px; }
    .tabs button { background: #e4f3f1; color: #10413c; }
    .tabs .active { background: #0f766e; color: #fff; }
    .auth-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .filter-row input { width: 100%; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-top: 12px; }
    .cafe-card { border: 1px solid #d5e6e3; border-radius: 12px; padding: 10px; background: #fcfefe; }
    .cafe-top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .cafe-card h3 { margin: 0; font-size: 1rem; }
    .cafe-card p { margin: 4px 0; font-size: 0.9rem; }
    .match-score { color: #0a5f58; font-weight: 600; }
    .hint { color: #486c67; font-size: 0.88rem; }
    .error { color: #9e1a1a; margin: 0; }
    .review-item { border-top: 1px solid #e2efed; padding-top: 8px; }
    #map { width: 100%; height: 400px; border-radius: 10px; }
    .badge { display: inline-block; background: #dcfce7; color: #166534; border-radius: 6px; padding: 2px 7px; font-size: 0.78rem; font-weight: 600; margin-left: 6px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ── Data ──────────────────────────────────────────────────────────────────────
const CAFES = [
  { id:"cafe_001", name:"Kyoto Garden Cafe",    location:"Boston, MA",       lat:42.3565, lng:-71.0625, rating:4.8, profile:{sweetness:2,strength:5,milk:["oat","whole","none"],temp:["hot","iced"]} },
  { id:"cafe_002", name:"Cloud Matcha Lab",     location:"Cambridge, MA",    lat:42.3736, lng:-71.1097, rating:4.6, profile:{sweetness:3,strength:4,milk:["oat","almond","none"],temp:["iced"]} },
  { id:"cafe_003", name:"Uji Social",           location:"Brookline, MA",    lat:42.3318, lng:-71.1212, rating:4.4, profile:{sweetness:4,strength:3,milk:["whole","oat"],temp:["hot","iced"]} },
  { id:"cafe_004", name:"Ceremonial Corner",    location:"Somerville, MA",   lat:42.3876, lng:-71.0995, rating:4.9, profile:{sweetness:1,strength:5,milk:["none"],temp:["hot"]} },
  { id:"cafe_005", name:"Midori Station",       location:"Boston, MA",       lat:42.3496, lng:-71.0789, rating:4.3, profile:{sweetness:5,strength:2,milk:["whole","oat","almond"],temp:["iced"]} },
  { id:"cafe_006", name:"Cha Cha NYC",          location:"New York, NY",     lat:40.7282, lng:-73.9942, rating:4.7, profile:{sweetness:2,strength:4,milk:["oat","almond"],temp:["iced","hot"]} },
  { id:"cafe_007", name:"East Village Matcha",  location:"New York, NY",     lat:40.7264, lng:-73.9818, rating:4.5, profile:{sweetness:3,strength:5,milk:["none","oat"],temp:["hot"]} },
  { id:"cafe_008", name:"Shincha Roastery",     location:"San Francisco, CA",lat:37.7749, lng:-122.4194,rating:4.8, profile:{sweetness:1,strength:5,milk:["none","oat"],temp:["hot"]} },
  { id:"cafe_009", name:"Mission Matcha",       location:"San Francisco, CA",lat:37.7600, lng:-122.4148,rating:4.2, profile:{sweetness:4,strength:3,milk:["oat","almond","whole"],temp:["iced"]} },
  { id:"cafe_010", name:"Nori & Co.",           location:"Los Angeles, CA",  lat:34.0522, lng:-118.2437,rating:4.6, profile:{sweetness:3,strength:4,milk:["oat"],temp:["iced"]} },
  { id:"cafe_011", name:"Silver Lake Matcha",   location:"Los Angeles, CA",  lat:34.0869, lng:-118.2717,rating:4.4, profile:{sweetness:2,strength:5,milk:["none","almond"],temp:["hot","iced"]} },
  { id:"cafe_012", name:"Fuji Sip",             location:"Chicago, IL",      lat:41.8781, lng:-87.6298, rating:4.3, profile:{sweetness:3,strength:3,milk:["whole","oat"],temp:["hot","iced"]} },
  { id:"cafe_013", name:"Matsu Tea House",      location:"Seattle, WA",      lat:47.6062, lng:-122.3321,rating:4.9, profile:{sweetness:1,strength:5,milk:["none"],temp:["hot"]} },
  { id:"cafe_014", name:"Pike Matcha",          location:"Seattle, WA",      lat:47.6089, lng:-122.3400,rating:4.5, profile:{sweetness:2,strength:4,milk:["oat","whole"],temp:["hot","iced"]} },
  { id:"cafe_015", name:"Tenzo PDX",            location:"Portland, OR",     lat:45.5231, lng:-122.6765,rating:4.7, profile:{sweetness:2,strength:4,milk:["oat","almond"],temp:["hot","iced"]} },
  { id:"cafe_016", name:"Austin Matcha Bar",    location:"Austin, TX",       lat:30.2672, lng:-97.7431, rating:4.0, profile:{sweetness:4,strength:3,milk:["oat","whole"],temp:["iced"]} },
];

// ── Storage helpers ───────────────────────────────────────────────────────────
const read  = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
const write = (k, v) => localStorage.setItem(k, JSON.stringify(v));
const uid   = p => `${p}_${Math.random().toString(36).slice(2,9)}`;

// ── Recommender ───────────────────────────────────────────────────────────────
function scoreCafe(cafe, prefs, userCoords, focusMode) {
  const sd = Math.abs(cafe.profile.sweetness - prefs.sweetness);
  const xd = Math.abs(cafe.profile.strength  - prefs.strength);
  const taste = (1-sd/4)*0.35 + (1-xd/4)*0.4
              + (cafe.profile.milk.includes(prefs.milk) ? 1 : 0.3)*0.15
              + (cafe.profile.temp.includes(prefs.temp) ? 1 : 0.4)*0.1;

  let dist = 0.5;
  if (userCoords) {
    const R=6371, dLat=(cafe.lat-userCoords.lat)*Math.PI/180, dLng=(cafe.lng-userCoords.lng)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(userCoords.lat*Math.PI/180)*Math.cos(cafe.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    const km=2*R*Math.asin(Math.sqrt(a));
    dist = Math.min(1, Math.max(0.05, 1-km/20));
  }
  const tw = focusMode==="distance" ? 0.45 : focusMode==="balanced" ? 0.65 : 0.82;
  return +(taste*tw + dist*(1-tw)).toFixed(3);
}

// ── Map component ─────────────────────────────────────────────────────────────
function MatchaMap({ cafes, recIds, userCoords }) {
  const mapRef = useRef(null);
  const instanceRef = useRef(null);

  useEffect(() => {
    if (instanceRef.current) { instanceRef.current.remove(); instanceRef.current = null; }
    const center = userCoords ? [userCoords.lat, userCoords.lng]
                 : cafes[0]   ? [cafes[0].lat, cafes[0].lng]
                 : [39.8283, -98.5795];
    const map = L.map(mapRef.current).setView(center, userCoords ? 12 : 4);
    instanceRef.current = map;
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    const greenIcon = L.icon({ iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png", shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png", iconSize:[25,41], iconAnchor:[12,41], popupAnchor:[1,-34], shadowSize:[41,41] });
    const blueIcon  = L.icon({ iconUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png", shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png", iconSize:[25,41], iconAnchor:[12,41], popupAnchor:[1,-34], shadowSize:[41,41] });
    const redIcon   = L.icon({ iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png", shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png", iconSize:[25,41], iconAnchor:[12,41], popupAnchor:[1,-34], shadowSize:[41,41] });

    cafes.forEach(c => {
      L.marker([c.lat, c.lng], { icon: recIds.has(c.id) ? greenIcon : blueIcon })
       .bindPopup(`<b>${c.name}</b><br>${c.location}<br>⭐ ${c.rating}${recIds.has(c.id) ? '<br><span style="color:#16a34a">✅ Recommended</span>':''}`).addTo(map);
    });
    if (userCoords) {
      L.marker([userCoords.lat, userCoords.lng], { icon: redIcon }).bindPopup("📍 You are here").addTo(map);
    }
    return () => { map.remove(); instanceRef.current = null; };
  }, [cafes, recIds, userCoords]);

  return <div id="map" ref={mapRef} />;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [user,       setUser]       = useState(() => read("mm_session", null));
  const [authMode,   setAuthMode]   = useState("login");
  const [email,      setEmail]      = useState("");
  const [password,   setPassword]   = useState("");
  const [authErr,    setAuthErr]    = useState("");
  const [prefs,      setPrefs]      = useState(() => user ? read(`mm_prefs_${user.id}`, null) : null);
  const [focusMode,  setFocusMode]  = useState(() => user ? read(`mm_focus_${user.id}`, "taste") : "taste");
  const [favorites,  setFavorites]  = useState(() => user ? read(`mm_fav_${user.id}`, []) : []);
  const [reviews,    setReviews]    = useState(() => read("mm_reviews", []));
  const [filter,     setFilter]     = useState("");
  const [userCoords, setUserCoords] = useState(null);
  // onboarding
  const [obSweet, setObSweet] = useState(3);
  const [obStr,   setObStr]   = useState(3);
  const [obMilk,  setObMilk]  = useState("oat");
  const [obTemp,  setObTemp]  = useState("iced");
  // review form
  const [revCafe,  setRevCafe]  = useState("");
  const [revRating,setRevRating]= useState(5);
  const [revNotes, setRevNotes] = useState("");
  const [revErr,   setRevErr]   = useState("");

  useEffect(() => {
    navigator.geolocation?.getCurrentPosition(p => setUserCoords({ lat: p.coords.latitude, lng: p.coords.longitude }));
  }, []);

  // filtered cafes
  const cafes = useMemo(() =>
    CAFES.filter(c => !filter || c.location.toLowerCase().includes(filter.toLowerCase())),
    [filter]);

  // recommendations
  const recs = useMemo(() => {
    if (!prefs) return [];
    return cafes
      .map(c => ({ ...c, score: scoreCafe(c, prefs, userCoords, focusMode) }))
      .sort((a,b) => b.score - a.score)
      .slice(0, 8);
  }, [prefs, cafes, userCoords, focusMode]);

  const recIds = useMemo(() => new Set(recs.map(r => r.id)), [recs]);
  const recMap  = useMemo(() => new Map(recs.map(r => [r.id, r.score])), [recs]);

  // set default review cafe
  useEffect(() => { if (cafes[0] && !revCafe) setRevCafe(cafes[0].id); }, [cafes]);

  // ── Auth ──
  function handleAuth(e) {
    e.preventDefault(); setAuthErr("");
    const users = read("mm_users", []);
    const norm  = email.trim().toLowerCase();
    if (authMode === "register") {
      if (users.find(u => u.email === norm)) { setAuthErr("Email already registered."); return; }
      const u = { id: uid("user"), email: norm, password };
      write("mm_users", [...users, u]);
      const sess = { id: u.id, email: u.email };
      write("mm_session", sess);
      setUser(sess); setPrefs(null); setFavorites([]); setFocusMode("taste");
    } else {
      const found = users.find(u => u.email === norm && u.password === password);
      if (!found) { setAuthErr("Invalid email or password."); return; }
      const sess = { id: found.id, email: found.email };
      write("mm_session", sess);
      setUser(sess);
      setPrefs(read(`mm_prefs_${found.id}`, null));
      setFavorites(read(`mm_fav_${found.id}`, []));
      setFocusMode(read(`mm_focus_${found.id}`, "taste"));
    }
    setEmail(""); setPassword("");
  }

  function handleLogout() {
    localStorage.removeItem("mm_session");
    setUser(null); setPrefs(null); setFavorites([]); setFocusMode("taste");
  }

  // ── Onboarding ──
  function savePrefs(e) {
    e.preventDefault();
    const p = { sweetness: +obSweet, strength: +obStr, milk: obMilk, temp: obTemp };
    write(`mm_prefs_${user.id}`, p);
    setPrefs(p);
  }

  // ── Favorites ──
  function toggleFav(cafeId) {
    if (!user) return;
    const next = favorites.includes(cafeId) ? favorites.filter(x => x!==cafeId) : [...favorites, cafeId];
    write(`mm_fav_${user.id}`, next);
    setFavorites(next);
  }

  // ── Reviews ──
  function submitReview(e) {
    e.preventDefault(); setRevErr("");
    if (!user) { setRevErr("Log in to submit a review."); return; }
    const all = read("mm_reviews", []);
    const recent = all.filter(r => r.userId===user.id && Date.now()-new Date(r.date)<86400000);
    if (recent.length >= 10) { setRevErr("Review limit reached (10/day)."); return; }
    const rev = { id: uid("rev"), userId: user.id, userEmail: user.email, cafeId: revCafe, rating: +revRating, notes: revNotes, date: new Date().toISOString() };
    const next = [rev, ...all];
    write("mm_reviews", next);
    setReviews(next);
    setRevNotes(""); setRevRating(5);
  }

  const sortedReviews = [...reviews].sort((a,b) => new Date(b.date)-new Date(a.date));

  return (
    <div className="page">
      {/* Header */}
      <header className="app-header">
        <h1>🍵 MatchaMap</h1>
        <p>Discover high-quality matcha cafes with taste-first recommendations.</p>
      </header>

      {/* Auth */}
      <section className="card">
        {user ? (
          <div className="auth-row">
            <p style={{margin:0}}>Signed in as <strong>{user.email}</strong></p>
            <button className="secondary" onClick={handleLogout}>Log out</button>
          </div>
        ) : (
          <>
            <h2>Account</h2>
            <div className="tabs">
              <button className={authMode==="login"?"active":""} onClick={()=>setAuthMode("login")}>Log in</button>
              <button className={authMode==="register"?"active":""} onClick={()=>setAuthMode("register")}>Create account</button>
            </div>
            <form onSubmit={handleAuth} className="stack">
              <label>Email<input type="email" value={email} onChange={e=>setEmail(e.target.value)} required /></label>
              <label>Password<input type="password" value={password} onChange={e=>setPassword(e.target.value)} required minLength={6} /></label>
              <button type="submit">{authMode==="register"?"Create account":"Log in"}</button>
            </form>
            {authErr && <p className="error">{authErr}</p>}
          </>
        )}
      </section>

      {/* Onboarding */}
      {user && !prefs && (
        <section className="card">
          <h2>Matcha Preference Setup</h2>
          <p className="hint">Complete this once to unlock personalized recommendations.</p>
          <form onSubmit={savePrefs} className="stack">
            <label>Sweetness: <strong>{obSweet}</strong> (1 = unsweetened, 5 = very sweet)
              <input type="range" min="1" max="5" value={obSweet} onChange={e=>setObSweet(e.target.value)} />
            </label>
            <label>Matcha Strength: <strong>{obStr}</strong> (1 = light, 5 = bold)
              <input type="range" min="1" max="5" value={obStr} onChange={e=>setObStr(e.target.value)} />
            </label>
            <label>Milk preference
              <select value={obMilk} onChange={e=>setObMilk(e.target.value)}>
                <option value="oat">Oat milk</option>
                <option value="almond">Almond milk</option>
                <option value="whole">Whole milk</option>
                <option value="none">No milk</option>
              </select>
            </label>
            <label>Temperature
              <select value={obTemp} onChange={e=>setObTemp(e.target.value)}>
                <option value="iced">Iced</option>
                <option value="hot">Hot</option>
              </select>
            </label>
            <button type="submit">Save preferences &amp; get recommendations</button>
          </form>
        </section>
      )}

      {/* Preference controls */}
      {user && prefs && (
        <section className="card">
          <h2>Your Profile</h2>
          <p style={{margin:"0 0 10px"}}>Sweetness <strong>{prefs.sweetness}</strong> · Strength <strong>{prefs.strength}</strong> · Milk <strong>{prefs.milk}</strong> · Temp <strong>{prefs.temp}</strong></p>
          <label>Ranking focus
            <select value={focusMode} onChange={e=>{ setFocusMode(e.target.value); if(user) write(`mm_focus_${user.id}`,e.target.value); }}>
              <option value="taste">Taste-first</option>
              <option value="balanced">Balanced</option>
              <option value="distance">Distance-aware</option>
            </select>
          </label>
        </section>
      )}

      {/* Discovery filter */}
      <section className="card">
        <h2>Discover Cafes</h2>
        <input placeholder="Filter by city (e.g. Seattle, New York, Boston…)" value={filter} onChange={e=>setFilter(e.target.value)} />
        <p className="hint" style={{marginBottom:0}}>{cafes.length} cafe{cafes.length!==1?"s":""} shown</p>
      </section>

      {/* Map */}
      <section className="card">
        <h2>Map View 🗺️</h2>
        <p className="hint" style={{marginTop:0,marginBottom:8}}>
          © OpenStreetMap — no API key needed. &nbsp;
          <span style={{color:"#16a34a"}}>● Recommended</span> &nbsp;
          <span style={{color:"#2563eb"}}>● Cafe</span> &nbsp;
          {userCoords && <span style={{color:"#dc2626"}}>● You</span>}
        </p>
        <MatchaMap cafes={cafes} recIds={recIds} userCoords={userCoords} />
      </section>

      {/* Cafe list */}
      <section className="card">
        <h2>Matcha Cafes</h2>
        {cafes.length === 0 && <p>No cafes match this filter.</p>}
        <div className="grid">
          {cafes.map(cafe => (
            <article className="cafe-card" key={cafe.id}>
              <div className="cafe-top-row">
                <h3>{cafe.name} {recIds.has(cafe.id) && <span className="badge">Recommended</span>}</h3>
                <button className="chip" onClick={()=>toggleFav(cafe.id)}>
                  {favorites.includes(cafe.id) ? "★ Saved" : "☆ Save"}
                </button>
              </div>
              <p>📍 {cafe.location}</p>
              <p>⭐ {cafe.rating.toFixed(1)}</p>
              {recMap.has(cafe.id)
                ? <p className="match-score">Match: {Math.round(recMap.get(cafe.id)*100)}%</p>
                : <p className="hint">Log in &amp; set prefs for match scores.</p>}
            </article>
          ))}
        </div>
      </section>

      {/* Reviews */}
      <section className="card">
        <h2>Reviews</h2>
        {user ? (
          <form onSubmit={submitReview} className="stack" style={{marginBottom:16}}>
            <label>Cafe
              <select value={revCafe} onChange={e=>setRevCafe(e.target.value)}>
                {cafes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </label>
            <label>Rating
              <select value={revRating} onChange={e=>setRevRating(e.target.value)}>
                {[5,4,3,2,1].map(n=><option key={n} value={n}>{"⭐".repeat(n)} ({n})</option>)}
              </select>
            </label>
            <label>Flavor notes
              <textarea rows={2} value={revNotes} onChange={e=>setRevNotes(e.target.value)} placeholder="Earthy, grassy, sweet…" />
            </label>
            <button type="submit">Submit review</button>
            {revErr && <p className="error">{revErr}</p>}
          </form>
        ) : <p className="hint">Log in to submit a review.</p>}
        <div className="stack">
          {sortedReviews.slice(0,15).map(r => {
            const cafe = CAFES.find(c=>c.id===r.cafeId);
            return (
              <article className="review-item" key={r.id}>
                <p><strong>{cafe?.name || "Cafe"}</strong> · {"⭐".repeat(r.rating)} · <span className="hint">{r.userEmail}</span></p>
                <p>{r.notes || <em>No tasting notes.</em>}</p>
              </article>
            );
          })}
          {sortedReviews.length === 0 && <p className="hint">No reviews yet. Be the first!</p>}
        </div>
      </section>

      <footer style={{textAlign:"center",color:"#486c67",fontSize:"0.85rem"}}>
        🍵 MatchaMap · Built with React + OpenStreetMap · All data is stored locally in your browser.
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
